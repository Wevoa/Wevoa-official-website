<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WevoaWeb runtime flow</title>
  <desc id="desc">Diagram showing the runtime flow from browser to HTML response.</desc>
  <rect width="1200" height="260" rx="28" fill="#F7FBF7"/>

  <g>
    <rect x="40" y="70" width="200" height="120" rx="24" fill="#FFFFFF" stroke="#D5E8DB"/>
    <text x="104" y="120" fill="#123524" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Browser</text>
    <text x="78" y="155" fill="#587164" font-family="Segoe UI, Arial, sans-serif" font-size="18">Requests a page</text>
  </g>

  <path d="M240 130H315" stroke="#1B8A52" stroke-width="8" stroke-linecap="round"/>
  <path d="M305 112L335 130L305 148" fill="#1B8A52"/>

  <g>
    <rect x="335" y="70" width="240" height="120" rx="24" fill="#FFFFFF" stroke="#D5E8DB"/>
    <text x="389" y="120" fill="#123524" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">HTTP Server</text>
    <text x="389" y="155" fill="#587164" font-family="Segoe UI, Arial, sans-serif" font-size="18">Routes and static assets</text>
  </g>

  <path d="M575 130H650" stroke="#1B8A52" stroke-width="8" stroke-linecap="round"/>
  <path d="M640 112L670 130L640 148" fill="#1B8A52"/>

  <g>
    <rect x="670" y="70" width="240" height="120" rx="24" fill="#FFFFFF" stroke="#D5E8DB"/>
    <text x="730" y="120" fill="#123524" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">WevoaWeb</text>
    <text x="712" y="155" fill="#587164" font-family="Segoe UI, Arial, sans-serif" font-size="18">Interpreter and routes</text>
  </g>

  <path d="M910 130H985" stroke="#1B8A52" stroke-width="8" stroke-linecap="round"/>
  <path d="M975 112L1005 130L975 148" fill="#1B8A52"/>

  <g>
    <rect x="1005" y="70" width="155" height="120" rx="24" fill="#1B8A52"/>
    <text x="1055" y="120" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">HTML</text>
    <text x="1042" y="155" fill="#EAF8EE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Sent back</text>
  </g>
</svg>
